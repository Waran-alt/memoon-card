# Self-hosted observability: Loki + Promtail + Grafana + Prometheus + cAdvisor (metrics).
# Run on the Docker host (same machine as app containers). Promtail reads the Docker socket.
#
# Start (prod VPS, after app stack):
#   yarn docker:monitoring:up
#
# Or combine with app compose (merged env files):
#   yarn docker:prod:monitoring:up
#
# Grafana: http://127.0.0.1:${GRAFANA_PORT:-3333} (SSH tunnel or VPN only in production).
# Prometheus: http://127.0.0.1:${PROMETHEUS_PORT:-9090}
# cAdvisor: http://127.0.0.1:${CADVISOR_PORT:-8088}
# When merged with docker-compose.prod.yml (e.g. docker-compose.deploy.yml), Prometheus
# also joins `memoon-card-prod` so it can scrape `backend:4002`.

services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: memoon-card-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - memoon-monitoring
      - memoon-card-prod
    depends_on:
      - cadvisor
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: memoon-card-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:${CADVISOR_PORT:-8088}:8080"
    networks:
      - memoon-monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: memoon-card-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    networks:
      - memoon-monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    container_name: memoon-card-promtail
    user: root
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - memoon-monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: memoon-card-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3333}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3333}:3000"
    depends_on:
      - loki
      - prometheus
    networks:
      - memoon-monitoring
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  promtail_positions:
  grafana_data:

networks:
  memoon-monitoring:
    driver: bridge
  # Same logical network as docker-compose.prod.yml when files are merged (Prometheus → backend:4002).
  memoon-card-prod:
    driver: bridge
