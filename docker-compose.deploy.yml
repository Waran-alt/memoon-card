# Hostinger + local full stack (app + observability) in ONE file — Hostinger rejects compose files
# that only use `include` without a root `services` section.
#
# Prometheus/Loki/Promtail/Grafana use images built from monitoring/Dockerfile.* so the VPS does not
# need bind-mounts to ./monitoring (Hostinger deploy dir often lacks that tree).
#
# Keep in sync with docker-compose.prod.yml and docker-compose.monitoring.yml when those change.
# Local: yarn docker:deploy:up
#
# Reverse proxy (nginx): https://your-domain.com → frontend:3002, /api → backend:4002.
# Grafana / Loki / Prometheus / cAdvisor: loopback only (see monitoring/README.md).
# Monitoring services use deploy.resources (Compose v2+) to cap CPU/RAM on small VPS.

services:
  postgres:
    image: postgres:17-alpine
    container_name: memoon-card-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoon_card_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or GitHub Secrets}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - memoon-card-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: memoon-card-backend:latest
    container_name: memoon-card-backend-prod
    environment:
      NODE_ENV: production
      PORT: 4002
      GIT_SHA: ${GIT_SHA:-unknown}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://memoon-card.example.com}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memoon_card_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      DEV_EMAIL: ${DEV_EMAIL:-}
      DEV_PASSWORD: ${DEV_PASSWORD:-}
      DEV_USERNAME: ${DEV_USERNAME:-}
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memoon-card-prod
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://memoon-card.example.com}
    image: memoon-card-frontend:latest
    container_name: memoon-card-frontend-prod
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: http://backend:4002
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - backend
    networks:
      - memoon-card-prod
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: memoon-card-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "127.0.0.1:${CADVISOR_PORT:-8088}:8080"
    networks:
      - memoon-monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M

  prometheus:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.prometheus
    image: memoon-card-prometheus:latest
    container_name: memoon-card-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}'
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - memoon-monitoring
      - memoon-card-prod
    depends_on:
      - cadvisor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M

  loki:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.loki
    image: memoon-card-loki:latest
    container_name: memoon-card-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    networks:
      - memoon-monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          memory: 384M

  promtail:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.promtail
    image: memoon-card-promtail:latest
    container_name: memoon-card-promtail
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - memoon-monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          memory: 96M

  grafana:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.grafana
    image: memoon-card-grafana:latest
    container_name: memoon-card-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3333}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3333}:3000"
    depends_on:
      - loki
      - prometheus
    networks:
      - memoon-monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data_prod:
  prometheus_data:
  loki_data:
  promtail_positions:
  grafana_data:

networks:
  memoon-card-prod:
    driver: bridge
  memoon-monitoring:
    driver: bridge
