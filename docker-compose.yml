# Local dev stack. Default Postgres password and JWT in backend/.env are for development only; use strong secrets for shared machines.
# Do not commit .env files. Use `yarn docker:up` / `yarn dev` (merges .env + backend/.env + frontend/.env via scripts/compose-with-env.sh).
# Production: docker-compose.prod.yml, yarn docker:prod:up, documentation/DEPLOYMENT-HOSTINGER.md.
services:
  postgres:
    image: postgres:17-alpine
    container_name: memoon-card-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoon_card_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host port 5433 to avoid conflict with another Postgres on 5432; container listens on 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      memoon-card-network: {}
      db-admin-net:
        aliases:
          - postgres

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        RELEASE_LABEL: ${RELEASE_LABEL:-dev}
    container_name: memoon-card-backend
    env_file:
      - backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4002}
      POSTGRES_HOST: ${POSTGRES_HOST_DOCKER:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT_DOCKER:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-memoon_card_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      YARN_ENABLE_IMMUTABLE_INSTALLS: "0"
      APP_RELEASE: ${RELEASE_LABEL:-dev}
      GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "${BACKEND_PORT:-4002}:4002"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - memoon-card-network
    # Install at repo root, then start the backend workspace only (root `yarn dev` runs docker compose on the host).
    command: sh -c "cd /app && yarn install && yarn workspace @memoon-card/backend dev"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        RELEASE_LABEL: ${RELEASE_LABEL:-dev}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://memoon-card.localhost}
    container_name: memoon-card-frontend
    working_dir: /app/frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      YARN_ENABLE_IMMUTABLE_INSTALLS: "0"
      PORT: ${FRONTEND_PORT:-3002}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://memoon-card.localhost}
      BACKEND_URL: ${BACKEND_URL_DOCKER:-http://memoon-card-backend:4002}
      CHOKIDAR_USEPOLLING: 1
      CHOKIDAR_INTERVAL: 1000
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: 1000
    ports:
      - "${FRONTEND_PORT:-3002}:${FRONTEND_PORT:-3002}"
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      # Keep root workspace node_modules inside the image (hoisted install).
      # Same for frontend/node_modules: the bind mount would otherwise replace the image install
      # with the host's tree (mixed Yarn/npm or wrong tough-cookie layout → ENOENT on dist/cookie/…).
      - /app/frontend/node_modules
      # Do NOT mount an anonymous volume over frontend/.next: an empty volume hides
      # the build output and causes ENOENT on .next/dev (routes-manifest, required-server-files, …).
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - memoon-card-network
    # Absolute path: if WORKDIR is overridden to /app (e.g. Docker Desktop), a relative `scripts/…` breaks.
    command: ["/bin/sh", "/app/frontend/scripts/docker-dev-entrypoint.sh"]

volumes:
  postgres_data:

networks:
  memoon-card-network:
    driver: bridge
  db-admin-net:
    external: true
