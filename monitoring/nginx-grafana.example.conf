# Example: expose Grafana on a subdomain behind Nginx with TLS.
# Grafana stays bound to 127.0.0.1:3333 on the host (docker-compose); only Nginx listens on 443.
#
# Steps (overview — adapt paths and domain):
# 1. DNS: A/AAAA record grafana.example.com → your VPS IP.
# 2. Obtain certs (e.g. certbot --nginx) or use Hostinger-managed SSL.
# 3. Set on the VPS (compose env): GRAFANA_ROOT_URL=https://grafana.example.com
# 4. Optional: set frontend NEXT_PUBLIC_DEV_GRAFANA_URL to the same URL so the dev panel link works.
# 5. Reload Nginx: sudo nginx -t && sudo systemctl reload nginx
#
# Do not expose Prometheus, Loki, or cAdvisor on the public internet; use Grafana Explore/datasources.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.example.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.example.com/privkey.pem;

    # Optional extra hardening (uncomment if compatible with your Grafana version):
    # add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Optional: HTTP → HTTPS redirect
# server {
#     listen 80;
#     listen [::]:80;
#     server_name grafana.example.com;
#     return 301 https://$host$request_uri;
# }

